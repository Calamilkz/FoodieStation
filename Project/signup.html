<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งรหัสผ่าน - Foodie Station</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Scene/FoodieLogo.png">
</head>
<body>
    <div class="main-wrapper">
        <div class="login-container">
            <div class="auth-header">
                <h1 class="brand-title">Foodie<span>Station</span></h1>
            </div>

            <div class="auth-form active">
                <h2>ใส่รหัสผ่าน</h2>
                
                <div class="readonly-email-box">
                    <span id="displayUserEmail">กำลังโหลด...</span>
                </div>

                <div class="input-group">
                    <input type="password" id="signupPassword" placeholder="รหัสผ่าน" required>
                </div>
                
                <ul class="password-rules">
                    <li id="rule-length" class="invalid">✖ ความยาวอย่างน้อย 8 ตัวอักษร</li>
                    <li id="rule-char" class="invalid">✖ ตัวอักษร หรือสัญลักษณ์</li>
                    <li id="rule-num" class="invalid">✖ ตัวเลข</li>
                </ul>

                <button id="signupSubmitBtn" class="btn-primary" style="background-color: #0088ff;" disabled>สมัครสมาชิก</button>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="newsletterCheck">
                    <label for="newsletterCheck">ฉันอยากรับข่าวสารของวงในทาง email</label>
                </div>

                <div class="form-footer">
                    <a href="index.html" class="link-secondary">ย้อนกลับไปแก้อีเมล</a>
                </div>
            </div>

            <div id="messageContainer" class="message-container">
                <p id="message"></p>
            </div>
        </div>
    </div>

    <script type="module" src="signup.js"></script>
</body>
</html>
